<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SPACE RACES</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Russo+One&family=Share+Tech+Mono&display=swap');
:root {
  --bg: #0a0812;
  --panel: #12101a;
  --border: #2a1f3a;
  --rust: #6b2fa0;
  --rust2: #8844cc;
  --metal: #4a4a6a;
  --metal2: #6a6a8a;
  --dirt: #1a1428;
  --grime: #14111e;
  --accent: #00e5ff;
  --accent2: #ff2a6d;
  --text: #c8c0e0;
  --dim: #5a5078;
  --gold: #ffd700;
  --silver: #a0a0c0;
  --bronze: #cd7f32;
  --neon1: #00e5ff;
  --neon2: #ff2a6d;
  --neon3: #b44aff;
  --neon4: #ffaa00;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Share Tech Mono', monospace;
  overflow: hidden;
  height: 100vh; width: 100vw;
  touch-action: manipulation;
}
.screen { position:absolute; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center; z-index:10; }
.screen.active { display:flex; }
/* BACKGROUND TEXTURE */
#bg-layer {
  position:fixed; inset:0; pointer-events:none; z-index:0;
  background:
    radial-gradient(ellipse at 30% 70%, #1a0a2a 0%, #0a0812 50%),
    radial-gradient(ellipse at 80% 20%, #0f0818 0%, transparent 50%),
    radial-gradient(circle at 50% 80%, rgba(255,42,109,0.05) 0%, transparent 40%),
    radial-gradient(circle at 20% 30%, rgba(0,229,255,0.04) 0%, transparent 40%);
}
/* FLOATING DEBRIS */
.debris {
  position:fixed; pointer-events:none; z-index:1;
  font-size:var(--sz);
  opacity:0.15;
  animation: drift var(--dur) linear infinite;
  color: var(--metal);
}
@keyframes drift {
  from { transform: translate(0,0) rotate(0deg); }
  to   { transform: translate(var(--tx), var(--ty)) rotate(360deg); }
}
/* ===== MAIN MENU ===== */
.menu-title {
  font-family: 'Russo One', sans-serif;
  font-size: clamp(2rem, 8vw, 4.5rem);
  color: var(--neon1);
  letter-spacing: 0.15em;
  text-shadow: 0 0 10px var(--neon1), 0 0 40px var(--neon1), 0 0 80px rgba(0,229,255,0.3), 3px 3px 0 #1a0a3a;
  margin-bottom: 0.1em;
  text-transform: uppercase;
  animation: neon-flicker 4s ease-in-out infinite;
}
@keyframes neon-flicker {
  0%,100% { opacity:1; }
  92% { opacity:1; }
  93% { opacity:0.7; }
  94% { opacity:1; }
  96% { opacity:0.8; }
  97% { opacity:1; }
}
.menu-sub {
  font-size: clamp(0.55rem, 1.5vw, 0.75rem);
  letter-spacing: 0.4em;
  color: var(--dim);
  margin-bottom: 2.5rem;
  text-transform: uppercase;
}
.menu-card {
  background: linear-gradient(160deg, #18122a, #0e0a18);
  border: 1px solid var(--neon1);
  border-radius: 8px;
  padding: clamp(1.2rem, 4vw, 2rem);
  width: min(90vw, 420px);
  display: flex; flex-direction:column; gap:0.85rem;
  box-shadow: 0 0 20px rgba(0,229,255,0.1), inset 0 1px 0 rgba(0,229,255,0.1), 0 8px 32px rgba(0,0,0,0.6);
  position:relative;
}
.menu-card::before {
  content:'';position:absolute;inset:0;border-radius:8px;
  background: repeating-linear-gradient(45deg, transparent, transparent 20px, rgba(0,229,255,0.01) 20px, rgba(0,229,255,0.01) 21px);
  pointer-events:none;
}
.count-label {
  font-size: 0.65rem; letter-spacing:0.2em; color:var(--dim);
  text-transform:uppercase; text-align:center;
}
.count-selector { display:flex; gap:0.4rem; justify-content:center; flex-wrap:wrap; }
.count-btn {
  width:40px; height:40px;
  background: var(--grime);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--dim);
  font-family: 'Russo One', sans-serif;
  font-size: 0.9rem;
  cursor: pointer;
  transition: all 0.15s;
  touch-action: manipulation;
}
.count-btn:hover, .count-btn.active {
  background: rgba(200,134,10,0.2);
  border-color: var(--accent);
  color: var(--accent);
  box-shadow: 0 0 8px rgba(200,134,10,0.3);
}
.btn {
  padding: 0.75rem 1.2rem;
  border-radius: 5px; border:none;
  font-family: 'Russo One', sans-serif;
  font-size: clamp(0.7rem, 2vw, 0.85rem);
  letter-spacing: 0.08em;
  cursor: pointer; transition: all 0.15s;
  touch-action: manipulation;
  text-transform: uppercase;
}
.btn-primary {
  background: linear-gradient(135deg, #0a3a4a, #062a38);
  color: var(--neon1); border: 1px solid var(--neon1);
  box-shadow: 0 0 12px rgba(0,229,255,0.3), inset 0 1px 0 rgba(0,229,255,0.1);
}
.btn-primary:hover { transform:translateY(-1px); box-shadow:0 0 20px rgba(0,229,255,0.5); }
.btn-secondary {
  background: linear-gradient(135deg, #3a0a2a, #280818);
  color: var(--neon2); border: 1px solid var(--neon2);
  box-shadow: 0 0 12px rgba(255,42,109,0.3);
}
.btn-secondary:hover { transform:translateY(-1px); box-shadow:0 0 20px rgba(255,42,109,0.5); }
.btn-ghost {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--dim);
}
.btn-ghost:hover { border-color: var(--neon3); color: var(--neon3); }
/* ===== PICK / ENCYC ===== */
#pick-screen, #encyc-screen {
  padding: 1rem; gap: 0.8rem; overflow:hidden;
}
.screen-header {
  font-family: 'Russo One', sans-serif;
  font-size: clamp(0.8rem, 2.5vw, 1.1rem);
  color: var(--accent);
  letter-spacing: 0.15em;
  display:flex; align-items:center; gap:0.8rem;
  flex-wrap:wrap; justify-content:center;
}
.pick-count { color: var(--accent2); }
.search-bar {
  width: min(90vw, 560px);
  padding: 0.5rem 0.9rem;
  background: var(--grime);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.85rem; outline:none;
}
.search-bar:focus { border-color: var(--accent); }
.search-bar::placeholder { color: var(--dim); }
.roster-grid {
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 0.6rem;
  overflow-y:auto;
  width: min(95vw, 860px);
  max-height: calc(100vh - 200px);
  padding: 0.4rem;
}
.fighter-card {
  background: var(--grime);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 0.65rem;
  cursor: pointer; transition:all 0.15s;
  position:relative; touch-action:manipulation;
}
.fighter-card:hover { border-color: var(--rust2); }
.fighter-card.selected {
  border-color: var(--accent);
  background: rgba(200,134,10,0.1);
  box-shadow: 0 0 12px rgba(200,134,10,0.2);
}
.fighter-card.selected::after {
  content:'✓'; position:absolute; top:5px; right:7px;
  color:var(--accent); font-size:0.9rem; font-weight:bold;
}
.card-sprite {
  width:44px; height:44px; border-radius:6px;
  margin: 0 auto 0.4rem;
  display:flex; align-items:center; justify-content:center;
  font-size:1.4rem; border: 1px solid;
}
.card-name { font-family:'Russo One',sans-serif; font-size:0.65rem; letter-spacing:0.08em; color:var(--accent); text-align:center; margin-bottom:0.15rem; }
.card-desc { font-size:0.6rem; color:var(--dim); text-align:center; line-height:1.3; }
.card-hp { font-size:0.6rem; color:#88cc66; text-align:center; margin-top:0.25rem; }
.encyc-grid {
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
  gap:0.6rem;
  overflow-y:auto;
  width: min(95vw, 960px);
  max-height: calc(100vh - 150px);
  padding:0.4rem;
}
.encyc-card {
  background: var(--grime);
  border: 1px solid var(--border);
  border-radius:6px; padding:0.85rem;
  cursor:pointer; transition:all 0.15s; touch-action:manipulation;
}
.encyc-card:hover { border-color: var(--gold); }
.encyc-name { font-family:'Russo One',sans-serif; font-size:0.75rem; color:var(--gold); letter-spacing:0.1em; margin-bottom:0.25rem; }
.encyc-desc { font-size:0.65rem; color:var(--dim); margin-bottom:0.4rem; line-height:1.35; }
.encyc-hp { font-size:0.65rem; color:#88cc66; margin-bottom:0.4rem; }
.encyc-move { font-size:0.6rem; padding:0.2rem 0.45rem; border-radius:3px; margin-top:0.15rem; }
.move-regular { background:rgba(200,134,10,0.12); color:#c8a060; border:1px solid rgba(200,134,10,0.25); }
.move-special { background:rgba(180,60,10,0.15); color:#d08060; border:1px solid rgba(180,60,10,0.3); }
.move-tag { font-size:0.5rem; opacity:0.65; }
/* ===== BATTLE ===== */
#battle-screen { padding:0; overflow:hidden; flex-direction:row !important; align-items:stretch !important; justify-content:flex-start !important; }
#arena-wrap {
  position:relative; flex:1; height:100vh; overflow:hidden;
  background:
    radial-gradient(ellipse at 50% 50%, #1a0e28 0%, #0e0818 60%, #060410 100%);
}
/* Sidebar */
#battle-sidebar {
  width:220px; min-width:220px;
  height:100vh;
  background:rgba(8,4,16,0.97);
  border-left:1px solid var(--neon3);
  overflow-y:auto; overflow-x:hidden;
  display:flex; flex-direction:column;
  z-index:50; padding:0.5rem 0.4rem;
  gap:0.25rem;
}
#sb-title {
  font-family:'Russo One',sans-serif;
  font-size:0.55rem; letter-spacing:0.25em;
  color:var(--dim); text-align:center;
  text-transform:uppercase;
  padding:0.3rem 0 0.4rem;
  border-bottom:1px solid var(--border);
  margin-bottom:0.2rem;
  flex-shrink:0;
}
.sb-fighter {
  display:flex; align-items:center; gap:0.4rem;
  padding:0.3rem 0.4rem;
  border-radius:4px;
  border:1px solid var(--border);
  background:var(--grime);
  transition:opacity 0.4s, filter 0.4s;
  flex-shrink:0;
}
.sb-fighter.dead { opacity:0.28; filter:grayscale(1); }
.sb-emoji { font-size:1.25rem; flex-shrink:0; line-height:1; }
.sb-info { flex:1; min-width:0; }
.sb-name {
  font-family:'Russo One',sans-serif;
  font-size:0.5rem; color:var(--accent);
  letter-spacing:0.05em;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  margin-bottom:3px;
}
.sb-hp-wrap { height:4px; background:rgba(0,0,0,0.7); border-radius:2px; overflow:hidden; }
.sb-hp-bar  { height:100%; border-radius:2px; transition:width 0.25s, background 0.25s; }
/* Hide on-fighter labels/bars */
.fighter-label { display:none !important; }
.hp-bar-wrap   { display:none !important; }
/* ===== MOBILE ===== */
@media (max-width: 700px) {
  #battle-screen {
    flex-direction:column !important;
  }
  #arena-wrap {
    width:100vw !important;
    height:calc(100vh - 90px) !important;
    flex:none !important;
  }
  #battle-sidebar {
    width:100vw !important; min-width:0 !important;
    height:90px !important;
    flex-direction:row !important;
    border-left:none !important;
    border-top:2px solid var(--border);
    overflow-x:auto !important; overflow-y:hidden !important;
    padding:0.3rem !important;
    gap:0.3rem !important;
  }
  #sb-title { display:none !important; }
  .sb-fighter {
    min-width:100px; max-width:140px;
    flex-shrink:0 !important;
  }
  .fighter-body {
    width:26px !important; height:26px !important;
    font-size:0.85rem !important;
  }
  .speech-bubble { font-size:0.35rem !important; }
}
/* Grid floor */
#arena-wrap::before {
  content:'';position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(0,229,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,255,0.04) 1px, transparent 1px),
    linear-gradient(60deg, rgba(180,74,255,0.02) 1px, transparent 1px),
    linear-gradient(-60deg, rgba(180,74,255,0.02) 1px, transparent 1px);
  background-size:50px 50px, 50px 50px, 43px 50px, 43px 50px;
  pointer-events:none;
}
#arena-clip {
  position:absolute;
  top:0; left:0;
  overflow:hidden;
  width:100%; height:100%;
}
#arena {
  position:absolute; inset:0;
}
/* Octagon border drawn via canvas */
#octa-border {
  position:absolute;
  top:0; left:0;
  pointer-events:none;
  z-index:6;
}
#battle-hud {
  position:absolute; top:10px; left:50%;
  transform:translateX(-50%);
  display:flex; gap:0.8rem; align-items:center;
  z-index:60;
}
.hud-pill {
  font-family:'Russo One',sans-serif;
  font-size:clamp(0.55rem,1.8vw,0.75rem);
  color:var(--neon1);
  background:rgba(8,4,16,0.85);
  padding:0.25rem 0.7rem;
  border-radius:20px;
  border:1px solid var(--neon1);
  letter-spacing:0.08em;
}
/* ===== FIGHTER ===== */
.fighter {
  position:absolute;
  display:flex; flex-direction:column; align-items:center;
  pointer-events:none;
  z-index:10;
}
.fighter-body {
  width:64px; height:64px; border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  font-size:0;
  border:2px solid;
  position:relative;
  box-shadow: 0 0 12px rgba(0,229,255,0.3), 0 2px 8px rgba(0,0,0,0.8);
  transition: filter 0.1s;
  image-rendering: pixelated;
  overflow:hidden;
}
.fighter-body canvas {
  width:100%; height:100%;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  display:block;
}
.fighter-label {
  font-family:'Russo One',sans-serif;
  font-size:0.45rem; color:#ccb88a;
  white-space:nowrap;
  text-shadow:0 0 3px black,0 0 3px black;
  margin-top:2px;
}
.hp-bar-wrap { width:42px; height:4px; background:rgba(0,0,0,0.7); border-radius:2px; overflow:hidden; margin-top:2px; }
.hp-bar { height:100%; border-radius:2px; transition:width 0.25s, background 0.25s; }
/* SPEECH BUBBLE */
.speech-bubble {
  position:absolute;
  background:rgba(20,12,4,0.95);
  border:1px solid var(--rust);
  border-radius:5px;
  padding:2px 6px;
  font-family:'Share Tech Mono',monospace;
  font-size:clamp(0.38rem,1.2vw,0.5rem);
  color:var(--accent);
  white-space:nowrap;
  pointer-events:none;
  z-index:25;
  top:-26px; left:50%;
  transform:translateX(-50%);
  animation:bubble-pop 2s ease forwards;
}
.speech-bubble.special {
  border-color: var(--accent2);
  color: #e88050;
}
@keyframes bubble-pop {
  0%   { opacity:0; transform:translateX(-50%) translateY(4px) scale(0.8); }
  12%  { opacity:1; transform:translateX(-50%) translateY(0) scale(1); }
  75%  { opacity:1; }
  100% { opacity:0; transform:translateX(-50%) translateY(-6px); }
}
/* STATUS ICON */
.status-icon {
  position:absolute; top:-7px; right:-7px;
  font-size:0.6rem;
  animation:status-pulse 0.9s ease-in-out infinite;
}
@keyframes status-pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.25)} }
/* DAMAGE NUMBER */
.dmg-num {
  position:absolute;
  font-family:'Russo One',sans-serif;
  font-weight:700;
  pointer-events:none;
  z-index:30;
  animation:dmg-float 1s ease forwards;
  text-shadow:0 0 4px currentColor;
}
@keyframes dmg-float {
  0%   { opacity:1; transform:translate(-50%,-50%) scale(0.9); }
  25%  { opacity:1; transform:translate(-50%,calc(-50% - 18px)) scale(1.1); }
  100% { opacity:0; transform:translate(-50%,calc(-50% - 45px)) scale(0.85); }
}
/* DEATH BURST */
.death-burst {
  position:absolute; border-radius:50%;
  pointer-events:none; z-index:35;
  animation:death-anim 0.7s ease forwards;
}
@keyframes death-anim {
  0%   { transform:translate(-50%,-50%) scale(0); opacity:1; }
  50%  { transform:translate(-50%,-50%) scale(3.5); opacity:0.8; }
  100% { transform:translate(-50%,-50%) scale(5); opacity:0; }
}
/* ===========================
   MOVE-SPECIFIC ANIMATIONS
   =========================== */
/* Slash - quick arc */
.anim-slash {
  position:absolute; pointer-events:none; z-index:20;
  width:50px; height:50px;
  border:3px solid #cc8830;
  border-radius:50%;
  border-top-color:transparent;
  border-left-color:transparent;
  left:var(--ox); top:var(--oy);
  transform:translate(-50%,-50%) rotate(-45deg);
  animation:slash-arc 0.35s ease forwards;
}
@keyframes slash-arc {
  0%   { transform:translate(-50%,-50%) rotate(-45deg) scale(0.4); opacity:1; }
  60%  { transform:translate(-50%,-50%) rotate(90deg) scale(1.1); opacity:1; }
  100% { transform:translate(-50%,-50%) rotate(135deg) scale(1.3); opacity:0; }
}
/* Shoot - bullet trail */
.anim-bullet {
  position:absolute; pointer-events:none; z-index:20;
  width:12px; height:5px;
  background:linear-gradient(90deg, transparent, #c89030);
  border-radius:3px;
  box-shadow:0 0 6px #c89030;
}
/* Bomb - fuse then explosion */
.anim-bomb-fuse {
  position:absolute; pointer-events:none; z-index:18;
  width:14px; height:14px;
  background:radial-gradient(circle, #332200, #1a1000);
  border:2px solid #8B4513;
  border-radius:50%;
}
.anim-explosion {
  position:absolute; pointer-events:none; z-index:22;
  width:80px; height:80px;
  animation:explosion 0.5s ease forwards;
  transform-origin:center;
}
@keyframes explosion {
  0%   { transform:translate(-50%,-50%) scale(0); opacity:1; }
  30%  { transform:translate(-50%,-50%) scale(0.8); opacity:1; }
  70%  { transform:translate(-50%,-50%) scale(1.5); opacity:0.7; }
  100% { transform:translate(-50%,-50%) scale(2.2); opacity:0; }
}
/* Smash - ground crack lines */
.anim-smash {
  position:absolute; pointer-events:none; z-index:20;
  font-size:2.5rem;
  animation:smash-hit 0.4s ease forwards;
}
@keyframes smash-hit {
  0%   { transform:translate(-50%,-50%) scale(0.3) rotate(0deg); opacity:1; }
  40%  { transform:translate(-50%,-50%) scale(1.2) rotate(15deg); opacity:1; }
  100% { transform:translate(-50%,-50%) scale(1.6) rotate(20deg); opacity:0; }
}
/* Laser - thin line */
.anim-laser {
  position:absolute; pointer-events:none; z-index:22;
  height:3px;
  background:linear-gradient(90deg, #ff8800, #ffcc44, transparent);
  box-shadow:0 0 8px #ff8800, 0 0 16px #ff4400;
  transform-origin:left center;
  animation:laser-fire 0.3s ease forwards;
}
@keyframes laser-fire {
  0%   { opacity:0; transform:scaleX(0) rotate(var(--ang)); }
  20%  { opacity:1; transform:scaleX(1) rotate(var(--ang)); }
  80%  { opacity:1; }
  100% { opacity:0; transform:scaleX(1.05) rotate(var(--ang)); }
}
/* Teleport - blink rings */
.anim-teleport {
  position:absolute; pointer-events:none; z-index:22;
  width:40px; height:40px;
  border:3px solid #9955cc;
  border-radius:50%;
  animation:teleport-ring 0.4s ease forwards;
}
@keyframes teleport-ring {
  0%   { transform:translate(-50%,-50%) scale(0.2); opacity:1; }
  60%  { transform:translate(-50%,-50%) scale(1.4); opacity:0.8; }
  100% { transform:translate(-50%,-50%) scale(2); opacity:0; }
}
/* Black hole - swirling darkness */
.anim-blackhole {
  position:absolute; pointer-events:none; z-index:18;
  width:70px; height:70px;
  background:radial-gradient(circle, #000 25%, #220044 55%, transparent 75%);
  border-radius:50%;
  animation:bh-spin 0.8s linear infinite, bh-grow 0.3s ease forwards;
  box-shadow: 0 0 20px #6600aa, 0 0 40px #330066;
}
@keyframes bh-spin   { to { transform:translate(-50%,-50%) rotate(360deg); } }
@keyframes bh-grow   { from { transform:translate(-50%,-50%) scale(0.1) rotate(0deg); } to { transform:translate(-50%,-50%) scale(1) rotate(0deg); } }
/* Freeze ray - icy spike */
.anim-freeze {
  position:absolute; pointer-events:none; z-index:20;
  width:10px; height:10px;
  background:radial-gradient(circle, #aaddff, #0088cc);
  border-radius:50%;
  box-shadow:0 0 10px #00aaff, 0 0 20px #0055ff;
}
/* Freeze burst */
.anim-freeze-burst {
  position:absolute; pointer-events:none; z-index:22;
  width:60px; height:60px;
  animation:freeze-burst 0.5s ease forwards;
}
@keyframes freeze-burst {
  0%   { transform:translate(-50%,-50%) scale(0); opacity:1; }
  50%  { transform:translate(-50%,-50%) scale(1.1); opacity:1; }
  100% { transform:translate(-50%,-50%) scale(1.5); opacity:0; }
}
/* Vortex - spinning ring */
.anim-vortex {
  position:absolute; pointer-events:none; z-index:18;
  width:90px; height:90px;
  border:3px solid #7700aa;
  border-top-color:transparent;
  border-bottom-color:transparent;
  border-radius:50%;
  box-shadow:inset 0 0 20px #33006688, 0 0 15px #7700aa;
  animation:vortex-spin 0.4s linear infinite;
}
@keyframes vortex-spin { to { transform:translate(-50%,-50%) rotate(360deg); } }
/* Singularity - moving orb */
.anim-singularity {
  position:absolute; pointer-events:none; z-index:18;
  width:24px; height:24px;
  background:radial-gradient(circle, #000, #440088);
  border-radius:50%;
  box-shadow:0 0 15px #6600ff, 0 0 30px #330066;
  animation:sing-pulse 0.5s ease-in-out infinite alternate;
}
@keyframes sing-pulse { 0%{box-shadow:0 0 15px #6600ff} 100%{box-shadow:0 0 30px #aa00ff, 0 0 50px #6600ff} }
/* Gravity slam - shockwave ring */
.anim-gravslam {
  position:absolute; pointer-events:none; z-index:22;
  border-radius:50%;
  border:4px solid #c87010;
  animation:gravslam-ring 0.5s ease forwards;
}
@keyframes gravslam-ring {
  0%   { width:20px;height:20px; transform:translate(-50%,-50%); opacity:1; }
  100% { width:180px;height:180px; transform:translate(-50%,-50%); opacity:0; }
}
/* Chain lightning - jagged lines */
.anim-chain {
  position:absolute; pointer-events:none; z-index:22;
  height:3px;
  background:linear-gradient(90deg, #ffff44, #ffcc00, transparent);
  box-shadow:0 0 6px #ffff00, 0 0 12px #ff8800;
  animation:chain-flash 0.2s ease forwards;
  transform-origin:left center;
}
@keyframes chain-flash {
  0%,40% { opacity:1; }
  100% { opacity:0; }
}
/* Meteor - falling rock */
.anim-meteor-warn {
  position:absolute; pointer-events:none; z-index:15;
  border:3px dashed #aa3300;
  border-radius:50%;
  animation:warn-rotate 0.5s linear infinite;
}
@keyframes warn-rotate { to { transform:translate(-50%,-50%) rotate(360deg); } }
.anim-meteor-rock {
  position:absolute; pointer-events:none; z-index:22;
  font-size:2rem;
  animation:rock-fall 0.4s ease-in forwards;
}
@keyframes rock-fall {
  0%   { transform:translate(-50%, -80px) scale(0.3) rotate(0deg); opacity:0.5; }
  100% { transform:translate(-50%, -50%) scale(1.2) rotate(45deg); opacity:1; }
}
/* Earthquake - ground shake */
.anim-quake {
  position:absolute; pointer-events:none; z-index:18;
  width:160px; height:40px;
  border-bottom:4px solid #8B4513;
  border-radius:50%;
  animation:quake-wave 0.6s ease forwards;
}
@keyframes quake-wave {
  0%   { transform:translate(-50%,-50%) scaleX(0); opacity:1; }
  60%  { transform:translate(-50%,-50%) scaleX(1); opacity:0.8; }
  100% { transform:translate(-50%,-50%) scaleX(1.2); opacity:0; }
}
/* Shockwave - expanding ring */
.anim-shockwave {
  position:absolute; pointer-events:none; z-index:20;
  border-radius:50%;
  border:3px solid #c8a030;
  animation:shockwave-ring 0.5s ease forwards;
}
@keyframes shockwave-ring {
  0%   { width:10px;height:10px; transform:translate(-50%,-50%); opacity:1; }
  100% { width:200px;height:200px; transform:translate(-50%,-50%); opacity:0; }
}
/* Sacrifice - red nova */
.anim-sacrifice {
  position:absolute; pointer-events:none; z-index:22;
  border-radius:50%;
  background:radial-gradient(circle, #ff0000aa, #ff440055, transparent 70%);
  animation:sacrifice-nova 0.6s ease forwards;
}
@keyframes sacrifice-nova {
  0%   { width:10px;height:10px; transform:translate(-50%,-50%); opacity:1; }
  60%  { width:260px;height:260px; transform:translate(-50%,-50%); opacity:0.9; }
  100% { width:300px;height:300px; transform:translate(-50%,-50%); opacity:0; }
}
/* Leech - beam line */
.anim-leech {
  position:absolute; pointer-events:none; z-index:20;
  height:3px;
  background:linear-gradient(90deg, #88cc00, #cc4400, transparent);
  box-shadow:0 0 6px #88cc00;
  animation:leech-beam 0.4s ease forwards;
  transform-origin:left center;
}
@keyframes leech-beam { 0%{opacity:0.2} 30%{opacity:1} 100%{opacity:0} }
/* Spore cloud - drifting dots */
.anim-spore {
  position:absolute; pointer-events:none; z-index:18;
  border-radius:50%;
  background:radial-gradient(circle, #448822aa, #22440044, transparent);
  animation:spore-drift 3s ease forwards;
}
@keyframes spore-drift {
  0%   { transform:translate(-50%,-50%) scale(0.1); opacity:0.9; }
  50%  { transform:translate(-50%,-50%) translate(var(--dx),var(--dy)) scale(1); opacity:0.6; }
  100% { transform:translate(-50%,-50%) translate(calc(var(--dx)*1.8),calc(var(--dy)*1.8)) scale(1.2); opacity:0; }
}
/* Acid pool - corrosive puddle */
.anim-acid {
  position:absolute; pointer-events:none; z-index:12;
  border-radius:60% 40% 55% 45%;
  background:radial-gradient(ellipse, #44aa0088, #228800aa, transparent);
  border:2px solid #88cc2266;
  animation:acid-bubble 0.7s ease-in-out infinite alternate;
}
@keyframes acid-bubble { 0%{border-radius:60% 40% 55% 45%} 100%{border-radius:40% 60% 45% 55%} }
/* Flame trail */
.anim-flame {
  position:absolute; pointer-events:none; z-index:12;
  border-radius:50%;
  animation:flame-fade 1.2s ease forwards;
}
@keyframes flame-fade {
  0%   { transform:translate(-50%,-50%) scale(0.3); opacity:0.9; }
  40%  { transform:translate(-50%,-50%) scale(1) translateY(-4px); opacity:0.7; }
  100% { transform:translate(-50%,-50%) scale(0.2) translateY(-12px); opacity:0; }
}
/* Thorn wall - line of spikes */
.anim-thornwall {
  position:absolute; pointer-events:none; z-index:15;
  font-size:1.5rem;
  animation:thorn-appear 0.3s ease forwards, thorn-fade 2.5s 0.3s ease forwards;
}
@keyframes thorn-appear { from{transform:translate(-50%,-50%) scaleY(0)} to{transform:translate(-50%,-50%) scaleY(1)} }
@keyframes thorn-fade   { from{opacity:1} to{opacity:0} }
/* Overdrive - energy sparks */
.anim-overdrive {
  position:absolute; pointer-events:none; z-index:22;
  width:50px; height:50px;
  border:3px solid #ffcc00;
  border-radius:50%;
  animation:od-pulse 0.3s ease-in-out infinite alternate;
}
@keyframes od-pulse { 0%{box-shadow:0 0 8px #ffcc00} 100%{box-shadow:0 0 25px #ffcc00,0 0 50px #ff8800} }
/* Stealth - fade ripple */
.anim-stealth {
  position:absolute; pointer-events:none; z-index:22;
  border-radius:50%;
  border:2px solid rgba(150,150,200,0.6);
  animation:stealth-ripple 0.5s ease forwards;
}
@keyframes stealth-ripple {
  0%   { width:10px;height:10px; transform:translate(-50%,-50%); opacity:1; }
  100% { width:70px;height:70px; transform:translate(-50%,-50%); opacity:0; }
}
/* Mind control - spiral */
.anim-mindctrl {
  position:absolute; pointer-events:none; z-index:22;
  font-size:1.8rem;
  animation:mind-swirl 0.5s ease forwards;
}
@keyframes mind-swirl {
  0%   { transform:translate(-50%,-50%) scale(0) rotate(0deg); opacity:1; }
  60%  { transform:translate(-50%,-50%) scale(1.2) rotate(360deg); opacity:1; }
  100% { transform:translate(-50%,-50%) scale(1.4) rotate(400deg); opacity:0; }
}
/* Time warp - clock ripple */
.anim-timewarp {
  position:absolute; pointer-events:none; z-index:22;
  border-radius:50%;
  border:3px solid #8888cc;
  animation:time-pulse 0.6s ease forwards;
}
@keyframes time-pulse {
  0%   { width:10px;height:10px; transform:translate(-50%,-50%); opacity:1; border-color:#8888cc; }
  50%  { width:120px;height:120px; transform:translate(-50%,-50%); opacity:0.8; border-color:#ccccff; }
  100% { width:220px;height:220px; transform:translate(-50%,-50%); opacity:0; border-color:#4444aa; }
}
/* Soul drain - dark tendrils */
.anim-souldrain {
  position:absolute; pointer-events:none; z-index:20;
  height:2px;
  background:linear-gradient(90deg, #660066, #cc0044, transparent);
  box-shadow:0 0 6px #cc0044;
  animation:drain-beam 0.5s ease forwards;
  transform-origin:left center;
}
@keyframes drain-beam { 0%{opacity:0;height:2px} 40%{opacity:1;height:4px} 100%{opacity:0;height:2px} }
/* Nullify - X mark */
.anim-nullify {
  position:absolute; pointer-events:none; z-index:22;
  font-size:2.5rem; color:#ff44aa;
  text-shadow:0 0 10px #ff44aa;
  animation:nullify-x 0.5s ease forwards;
}
@keyframes nullify-x {
  0%   { transform:translate(-50%,-50%) scale(0) rotate(-30deg); opacity:1; }
  50%  { transform:translate(-50%,-50%) scale(1.3) rotate(0deg); opacity:1; }
  100% { transform:translate(-50%,-50%) scale(1.5) rotate(5deg); opacity:0; }
}
/* Clone - copy flash */
.anim-clone {
  position:absolute; pointer-events:none; z-index:22;
  width:35px; height:35px;
  border:3px solid #88aaff;
  border-radius:50%;
  animation:clone-flash 0.4s ease forwards;
}
@keyframes clone-flash {
  0%   { transform:translate(-50%,-50%) scale(0.2); opacity:1; }
  50%  { transform:translate(-50%,-50%) scale(1.5); opacity:0.8; }
  100% { transform:translate(-50%,-50%) scale(2); opacity:0; }
}
/* Orbital drop - reticle then impact */
.anim-orbital {
  position:absolute; pointer-events:none; z-index:15;
  width:60px; height:60px;
  border:3px solid #aa3300;
  border-radius:50%;
}
.anim-orbital-line {
  position:absolute; pointer-events:none; z-index:15;
  background:#aa3300;
}
/* Plasma vent - cone spray */
.anim-plasma {
  position:absolute; pointer-events:none; z-index:20;
  width:100px; height:50px;
  background:conic-gradient(from -30deg, transparent 0deg, #ff8800aa 60deg, transparent 90deg);
  border-radius:0 100px 100px 0;
  animation:plasma-vent 0.4s ease forwards;
  transform-origin:left center;
}
@keyframes plasma-vent { 0%{opacity:0.3;scaleX:0} 30%{opacity:1} 100%{opacity:0} }
/* Cryo field - ice crystals */
.anim-cryo {
  position:absolute; pointer-events:none; z-index:15;
  border-radius:50%;
  background:radial-gradient(circle, #aaddff33, #0055aa22, transparent);
  border:2px solid #aaddff44;
  animation:cryo-spread 2.5s ease forwards;
}
@keyframes cryo-spread {
  0%   { transform:translate(-50%,-50%) scale(0); opacity:0.9; }
  50%  { transform:translate(-50%,-50%) scale(1); opacity:0.7; }
  100% { transform:translate(-50%,-50%) scale(1.1); opacity:0; }
}
/* Nova burst - massive ring */
.anim-nova {
  position:absolute; pointer-events:none; z-index:22;
  border-radius:50%;
  animation:nova-ring 0.55s ease forwards;
}
@keyframes nova-ring {
  0%   { width:10px;height:10px; transform:translate(-50%,-50%); opacity:1; background:radial-gradient(circle,#fff8e0,#ff8800,transparent); }
  40%  { width:140px;height:140px; transform:translate(-50%,-50%); opacity:0.9; }
  100% { width:260px;height:260px; transform:translate(-50%,-50%); opacity:0; }
}
/* Hex - cursed symbol */
.anim-hex {
  position:absolute; pointer-events:none; z-index:22;
  font-size:1.8rem;
  animation:hex-appear 0.5s ease forwards;
}
@keyframes hex-appear {
  0%   { transform:translate(-50%,-50%) scale(0) rotate(-60deg); opacity:1; }
  50%  { transform:translate(-50%,-50%) scale(1.2) rotate(0deg); opacity:1; }
  100% { transform:translate(-50%,-50%) scale(1.4) rotate(10deg); opacity:0; }
}
/* Phase shift - phase out */
.anim-phase {
  position:absolute; pointer-events:none; z-index:22;
  font-size:1.5rem;
  animation:phase-out 0.5s ease forwards;
}
@keyframes phase-out {
  0%   { transform:translate(-50%,-50%) scale(1); opacity:1; filter:none; }
  100% { transform:translate(-50%,-50%) scale(1.5); opacity:0; filter:blur(4px); }
}
/* Mortar - arc shells */
.anim-mortar {
  position:absolute; pointer-events:none; z-index:20;
  width:10px; height:10px;
  background:radial-gradient(circle, #cc6600, #662200);
  border-radius:50%;
  box-shadow:0 0 6px #cc6600;
}
/* Fungal burst - spore splat */
.anim-fungal {
  position:absolute; pointer-events:none; z-index:20;
  border-radius:50%;
  background:radial-gradient(circle, #66aa2288, #224400aa, transparent);
  animation:fungal-burst 0.5s ease forwards;
}
@keyframes fungal-burst {
  0%   { width:10px;height:10px; transform:translate(-50%,-50%); opacity:1; }
  50%  { width:100px;height:100px; transform:translate(-50%,-50%); opacity:0.8; }
  100% { width:140px;height:140px; transform:translate(-50%,-50%); opacity:0; }
}
/* Gravity well - warped rings */
.anim-gravwell {
  position:absolute; pointer-events:none; z-index:18;
  border:2px solid #9966aa;
  border-radius:50%;
  animation:gw-pulse 0.8s ease-in-out infinite alternate;
}
@keyframes gw-pulse {
  0%   { transform:translate(-50%,-50%) scale(0.7); opacity:0.5; border-color:#663388; }
  100% { transform:translate(-50%,-50%) scale(1.0); opacity:0.8; border-color:#cc88ff; }
}
/* Warp dash - afterimage streaks */
.anim-warp {
  position:absolute; pointer-events:none; z-index:16;
  border-radius:50%;
  opacity:0;
  animation:warp-after 0.4s ease forwards;
}
@keyframes warp-after {
  0%   { opacity:0.6; transform:translate(-50%,-50%) scale(1); }
  100% { opacity:0; transform:translate(-50%,-50%) scale(0.4); }
}
/* Claw - triple scratch */
.anim-claw {
  position:absolute; pointer-events:none; z-index:22;
  font-size:2rem;
  animation:claw-swipe 0.35s ease forwards;
}
@keyframes claw-swipe {
  0%   { transform:translate(-50%,-50%) scale(0.3) rotate(-30deg); opacity:1; }
  50%  { transform:translate(-50%,-50%) scale(1.2) rotate(10deg); opacity:1; }
  100% { transform:translate(-50%,-50%) scale(1.4) rotate(20deg); opacity:0; }
}
/* Net - web throw */
.anim-net {
  position:absolute; pointer-events:none; z-index:20;
  font-size:1.4rem;
  animation:net-throw 0.3s ease forwards;
}
@keyframes net-throw {
  0%   { transform:translate(-50%,-50%) scale(0.2) rotate(-20deg); opacity:1; }
  60%  { transform:translate(-50%,-50%) scale(1.1) rotate(10deg); opacity:1; }
  100% { transform:translate(-50%,-50%) scale(1.3) rotate(15deg); opacity:0; }
}
/* Reflect shield flash */
.anim-reflect {
  position:absolute; pointer-events:none; z-index:22;
  width:50px; height:50px;
  border:4px solid #ccccff;
  border-radius:50%;
  box-shadow:0 0 15px #aaaaff;
  animation:reflect-flash 0.4s ease forwards;
}
@keyframes reflect-flash {
  0%   { transform:translate(-50%,-50%) scale(0.5); opacity:1; }
  50%  { transform:translate(-50%,-50%) scale(1.3); opacity:1; }
  100% { transform:translate(-50%,-50%) scale(1.8); opacity:0; }
}
/* Scatter shot - fan of lines */
.anim-scatter-dot {
  position:absolute; pointer-events:none; z-index:20;
  width:7px; height:7px;
  background:#c87030;
  border-radius:50%;
  box-shadow:0 0 5px #c87030;
}
/* ===== RESULTS ===== */
#results-screen { gap:1.5rem; padding:2rem; }
.results-title {
  font-family:'Russo One',sans-serif;
  font-size:clamp(1.2rem,5vw,2.5rem);
  color:var(--gold); letter-spacing:0.25em;
  text-shadow:3px 3px 0 #4a2800;
}
.podium-wrap { display:flex; align-items:flex-end; justify-content:center; gap:0.8rem; }
.podium-place { display:flex; flex-direction:column; align-items:center; gap:0.4rem; }
.podium-icon { width:55px;height:55px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.8rem; border:3px solid; }
.podium-name { font-family:'Russo One',sans-serif; font-size:clamp(0.5rem,1.5vw,0.65rem); text-align:center; letter-spacing:0.08em; }
.podium-block { border-radius:5px 5px 0 0; width:75px; display:flex; align-items:center; justify-content:center; font-family:'Russo One',sans-serif; font-size:1.4rem; font-weight:900; }
.place-1 .podium-icon  { border-color:var(--gold);   box-shadow:0 0 15px var(--gold); }
.place-1 .podium-name  { color:var(--gold); }
.place-1 .podium-block { height:90px; background:linear-gradient(180deg,#9a6808,#4a2800); color:var(--gold); }
.place-2 .podium-icon  { border-color:var(--silver); box-shadow:0 0 12px var(--silver); }
.place-2 .podium-name  { color:var(--silver); }
.place-2 .podium-block { height:65px; background:linear-gradient(180deg,#606050,#303028); color:var(--silver); }
.place-3 .podium-icon  { border-color:var(--bronze); box-shadow:0 0 10px var(--bronze); }
.place-3 .podium-name  { color:var(--bronze); }
.place-3 .podium-block { height:45px; background:linear-gradient(180deg,#603018,#301808); color:var(--bronze); }
.results-btns { display:flex; gap:0.8rem; flex-wrap:wrap; justify-content:center; }
/* SCROLLBARS */
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:var(--grime); }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:var(--rust); }
</style>
</head>
<body>
<div id="bg-layer"></div>
<!-- ===== MAIN MENU ===== -->
<div id="menu" class="screen active">
  <div class="menu-title">SPACE RACES</div>
  <div class="menu-sub">Underground Fight Pit · Place Your Bets</div>
  <div class="menu-card">
    <div class="count-label">Fighter Count</div>
    <div class="count-selector" id="count-sel"></div>
    <button class="btn btn-primary"   onclick="openPick()">⚔ Pick Fighters</button>
    <button class="btn btn-secondary" onclick="randomizeBattle()">🎲 Randomize & Fight</button>
    <button class="btn btn-ghost"     onclick="openEncyc()">📖 Encyclopedia</button>
  </div>
</div>
<!-- ===== PICK ===== -->
<div id="pick-screen" class="screen">
  <div class="screen-header">
    <button class="btn btn-ghost" onclick="showScreen('menu')" style="padding:0.35rem 0.7rem;font-size:0.65rem">← Back</button>
    <span>SELECT FIGHTERS</span>
    <span class="pick-count" id="pick-label">0/0</span>
    <button class="btn btn-primary" id="start-btn" onclick="startPickedBattle()" style="padding:0.35rem 0.7rem;font-size:0.65rem" disabled>▶ Fight</button>
  </div>
  <input class="search-bar" id="pick-search" placeholder="Search fighters..." oninput="filterRoster(this.value)">
  <div class="roster-grid" id="roster-grid"></div>
</div>
<!-- ===== ENCYCLOPEDIA ===== -->
<div id="encyc-screen" class="screen">
  <div class="screen-header">
    <button class="btn btn-ghost" onclick="showScreen('menu')" style="padding:0.35rem 0.7rem;font-size:0.65rem">← Back</button>
    <span style="color:var(--gold)">📖 ENCYCLOPEDIA</span>
  </div>
  <input class="search-bar" id="encyc-search" placeholder="Search characters or moves..." oninput="filterEncyc(this.value)">
  <div class="encyc-grid" id="encyc-grid"></div>
</div>
<!-- ===== BATTLE ===== -->
<div id="battle-screen" class="screen">
  <div id="arena-wrap">
    <div id="arena-clip">
      <div id="arena"></div>
    </div>
    <canvas id="octa-border" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:6"></canvas>
    <div id="battle-hud">
      <div class="hud-pill" id="alive-pill">⚙ 0 Alive</div>
      <button class="btn btn-ghost" onclick="endBattle()" style="padding:0.25rem 0.6rem;font-size:0.55rem">✕ Quit</button>
    </div>
  </div>
  <div id="battle-sidebar">
    <div id="sb-title">Fighters</div>
  </div>
</div>
<!-- ===== RESULTS ===== -->
<div id="results-screen" class="screen">
  <div class="results-title">BATTLE OVER</div>
  <div class="podium-wrap" id="podium"></div>
  <div class="results-btns">
    <button class="btn btn-primary"   onclick="showScreen('menu')">🏠 Menu</button>
    <button class="btn btn-secondary" onclick="replayBattle()">🔄 Rematch</button>
  </div>
</div>
<script>
// ============================================================
// DATA TABLES
// ============================================================
const REG = {
  slash:       {name:'Slash',       dmg:[18,28], range:55,  cd:2.2,  type:'melee',    animKey:'slash'},
  shoot:       {name:'Shoot',       dmg:[20,30], range:300, cd:2.5,  type:'proj',     speed:190, animKey:'shoot'},
  bomb:        {name:'Bomb',        dmg:[32,46], range:180, cd:4.0,  type:'bomb',     animKey:'bomb'},
  turret:      {name:'Turret',      dmg:[13,18], range:200, cd:7.0,  type:'turret',   animKey:'turret'},
  jab:         {name:'Jab',         dmg:[12,20], range:44,  cd:1.6,  type:'melee',    animKey:'jab'},
  scatter_shot:{name:'Scatter',     dmg:[9,14],  range:220, cd:3.0,  type:'scatter',  animKey:'scatter'},
  bite:        {name:'Bite',        dmg:[22,32], range:50,  cd:2.8,  type:'melee',    animKey:'bite'},
  smash:       {name:'Smash',       dmg:[36,52], range:55,  cd:4.5,  type:'melee',    animKey:'smash'},
  throw_obj:   {name:'Throw',       dmg:[28,38], range:260, cd:3.5,  type:'proj',     speed:155, animKey:'throw'},
  spike:       {name:'Spike',       dmg:[22,32], range:320, cd:2.8,  type:'proj',     speed:270, animKey:'spike'},

function getArchetype(f) {
  if(f.arch) return f.arch;
  const d=f.desc.toLowerCase();
  if(d.includes('bruiser')||d.includes('massive')||d.includes('rocky')||d.includes('crash')) return 'bruiser';
  if(d.includes('sniper')||d.includes('beam')||d.includes('artillery')||d.includes('picks off')) return 'sniper';
  if(d.includes('psychic')||d.includes('gravity mage')||d.includes('mind')||d.includes('void')||d.includes('bender')) return 'psychic';
  if(d.includes('feral')||d.includes('beast')||d.includes('venom')||d.includes('fungal')||d.includes('leech')) return 'beast';
  if(d.includes('engineer')||d.includes('turret')||d.includes('machine')||d.includes('fortress')) return 'engineer';
  if(d.includes('shadow')||d.includes('ghost')||d.includes('mist')||d.includes('vanish')||d.includes('stealth')) return 'assassin';
  if(d.includes('armored')||d.includes('tank')||d.includes('reflective')||d.includes('spike-covered')||d.includes('drain tank')) return 'tank';
  if(d.includes('mage')||d.includes('priest')||d.includes('recovers')||d.includes('time')||d.includes('arc mage')) return 'mage';
  if(d.includes('web')||d.includes('spider')||d.includes('insect')||d.includes('parasite')||d.includes('snare')) return 'insectoid';
  if(d.includes('berserker')||d.includes('martyr')||d.includes('burns itself')||d.includes('rage')) return 'berserker';
  if(d.includes('gunner')||d.includes('scatter')||d.includes('shooter')||d.includes('overdriv')) return 'gunner';
  if(d.includes('charger')||d.includes('runner')||d.includes('fast')||d.includes('outpace')||d.includes('dash')) return 'charger';
  if(d.includes('duplicat')||d.includes('clone')||d.includes('organism')) return 'blob';
  return 'bruiser';
}
function renderSprite(archetype, colors, facing) {
  const key=archetype+'_'+colors.join('_')+'_'+(facing<0?'L':'R');
  if(SPRITE_CACHE[key]) return SPRITE_CACHE[key];
  const c=document.createElement('canvas');
  c.width=64; c.height=64;
  const ctx=c.getContext('2d');
  const arch=ARCHETYPES[archetype]||ARCHETYPES.bruiser;
  const S=4; // scale factor (16x16 grid → 64x64)
  const flip=facing<0;
  const parts=[
    {rects:arch.head, col:colors[0]||'#888'},       // head/skin
    {rects:arch.torso, col:colors[1]||'#666'},       // torso/armor
    {rects:arch.armL, col:colors[1]||'#666'},        // arms same as torso
    {rects:arch.armR, col:colors[1]||'#666'},
    {rects:arch.legL, col:colors[2]||'#555'},        // legs
    {rects:arch.legR, col:colors[2]||'#555'},
    {rects:arch.extra, col:colors[3]||colors[0]||'#aaa'}, // extras/weapons
  ];
  if(flip) { ctx.translate(64,0); ctx.scale(-1,1); }
  // Draw fill pass
  parts.forEach(p=>{
    p.rects.forEach(r=>{
      const px=r[0]*S, py=r[1]*S, pw=r[2]*S, ph=r[3]*S;
      // base fill
      ctx.fillStyle=p.col;
      ctx.fillRect(px,py,pw,ph);
      // lighter top highlight (1 pixel row)
      ctx.fillStyle=shadeColor(p.col,50);
      ctx.fillRect(px,py,pw,S);
      // darker bottom shadow (1 pixel row)
      ctx.fillStyle=shadeColor(p.col,-50);
      ctx.fillRect(px,py+ph-S,pw,S);
      // dark left edge
      ctx.fillStyle='rgba(0,0,0,0.4)';
      ctx.fillRect(px,py,1,ph);
      // dark right edge
      ctx.fillRect(px+pw-1,py,1,ph);
    });
  });
  // Black outline around all parts (1px)
  ctx.strokeStyle='rgba(0,0,0,0.8)';
  ctx.lineWidth=1;
  parts.forEach(p=>{
    p.rects.forEach(r=>{
      ctx.strokeRect(r[0]*S+0.5, r[1]*S+0.5, r[2]*S-1, r[3]*S-1);
    });
  });
  // Eyes on head
  const h=arch.head[0];
  const eyeY=(h[1]+1)*S;
  ctx.fillStyle='#ffffff';
  ctx.fillRect((h[0]+1)*S, eyeY, S, S);
  ctx.fillRect((h[0]+h[2]-2)*S, eyeY, S, S);
  // glowing eye color
  ctx.fillStyle=colors[3]||'#00e5ff';
  ctx.fillRect((h[0]+1)*S+1, eyeY+1, S-2, S-2);
  ctx.fillRect((h[0]+h[2]-2)*S+1, eyeY+1, S-2, S-2);
  SPRITE_CACHE[key]=c;
  return c;
}
function shadeColor(col,amt) {
  let r=parseInt(col.slice(1,3),16), g=parseInt(col.slice(3,5),16), b=parseInt(col.slice(5,7),16);
  r=Math.max(0,Math.min(255,r+amt)); g=Math.max(0,Math.min(255,g+amt)); b=Math.max(0,Math.min(255,b+amt));
  return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}
function getSpriteColors(data) {
  const base=data.color;
  const r=parseInt(base.slice(1,3),16), g=parseInt(base.slice(3,5),16), b=parseInt(base.slice(5,7),16);
  return [
    base,                                               // head/skin
    shadeColor(base,-40),                               // torso/armor (darker)
    shadeColor(base,-70),                               // legs (darkest)
    '#'+[Math.min(255,r+60),Math.min(255,g+60),Math.min(255,b+60)].map(v=>v.toString(16).padStart(2,'0')).join('') // weapon/extra (lighter)
  ];
}

// ============================================================
// OCTAGON
// ============================================================
function calcOctagon(cx, cy, r) {
  const pts=[];
  for(let i=0;i<8;i++){
    const a=(i/8)*Math.PI*2 - Math.PI/8;
    pts.push({x:cx+Math.cos(a)*r, y:cy+Math.sin(a)*r});
  }
  return pts;
}
function pointInOctagon(px, py, cx, cy, r) {
  const pts = calcOctagon(cx, cy, r);
  let inside=false;
  for(let i=0,j=7;i<8;j=i++){
    const xi=pts[i].x,yi=pts[i].y,xj=pts[j].x,yj=pts[j].y;
    if(((yi>py)!==(yj>py))&&(px<(xj-xi)*(py-yi)/(yj-yi)+xi)) inside=!inside;
  }
  return inside;
}
function clampToOctagon(x, y, cx, cy, r) {
  if(pointInOctagon(x,y,cx,cy,r-20)) return {x,y};
  const pts=calcOctagon(cx,cy,r-25);
  let best=null, bestD=Infinity;
  for(let i=0;i<8;i++){
    const a=pts[i], b=pts[(i+1)%8];
    const abx=b.x-a.x, aby=b.y-a.y;
    const len2=abx*abx+aby*aby;
    let t=len2>0?((x-a.x)*abx+(y-a.y)*aby)/len2:0;
    t=Math.max(0,Math.min(1,t));
    const px=a.x+t*abx, py=a.y+t*aby;
    const d=Math.hypot(x-px,y-py);
    if(d<bestD){bestD=d;best={x:px,y:py};}
  }
  return best||{x,y};
}
function drawOctaBorder() {
  const canvas=document.getElementById('octa-border');
  const wrap=document.getElementById('arena-wrap');
  const w=wrap.clientWidth, h=wrap.clientHeight;
  canvas.width=w; canvas.height=h;
  const cx=w/2, cy=h/2, r=Math.min(w,h)*0.46;
  const pts=calcOctagon(cx,cy,r);
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,w,h);
  // Glow
  ctx.shadowColor='#8B4513';
  ctx.shadowBlur=12;
  ctx.strokeStyle='#8B4513';
  ctx.lineWidth=3;
  ctx.beginPath();
  pts.forEach((p,i)=>{i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y);});
  ctx.closePath();
  ctx.stroke();
  // Inner line
  ctx.shadowBlur=0;
  ctx.strokeStyle='#c86020';
  ctx.lineWidth=1;
  ctx.globalAlpha=0.4;
  ctx.beginPath();
  pts.forEach((p,i)=>{i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y);});
  ctx.closePath();
  ctx.stroke();
  ctx.globalAlpha=1;
  // Corner dots
  pts.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,5,0,Math.PI*2);
    ctx.fillStyle='#6b3010';
    ctx.strokeStyle='#c86020';
    ctx.lineWidth=1;
    ctx.fill();
    ctx.stroke();
  });
}

  arena.innerHTML='';

  const SIDEBAR_H_MOBILE=90;
  if(mobile){
    AW=window.innerWidth; AH=window.innerHeight-SIDEBAR_H_MOBILE;
  } else {
    AW=window.innerWidth-SIDEBAR_W; AH=window.innerHeight;
  }

  });

  rafId=requestAnimationFrame(loop);

  return {

    facing:1,
    hp:data.hp, maxHp:data.hp, alive:true,
    vx:(Math.random()-0.5)*25, vy:(Math.random()-0.5)*25,

    regCDmax:(REG[data.reg]?.cd||2.5)*(0.9+Math.random()*0.2),
    spcCDmax:(SPC[data.spc]?.cd||8)*(0.9+Math.random()*0.2),
    speed:28+Math.random()*12,
    statuses:{},
    frozen:0, hexed:0, overdriven:0, stealthed:0, stealthBonus:false,
    shielded:false, spikeArmor:data.spc==='spike_armor',
    trailActive:0, cloneOf:null,
    mindCtrl:null,
  };
}

function loop(ts) {
  const dt=Math.min((ts-lastT)/1000,0.05);
  lastT=ts;
  tickFighters(dt);
  tickProjectiles(dt);
  tickVortices(dt);
  tickClouds(dt);
  tickFlames(dt);
  tickSingularities(dt);
  tickTurrets(dt);
  updateHUD();
  const alive=fighters.filter(f=>f.alive&&!f.cloneOf);
  if(alive.length<=1){
    bTO(()=>showResults(alive),900);
    return;
  }
  rafId=requestAnimationFrame(loop);
}

// FIGHTER TICK
// ============================================================
function tickFighters(dt) {
  const CX=AW/2, CY=AH/2, R=Math.min(AW,AH)*0.46;
  fighters.forEach(f=>{
    if(!f.alive) return;
    // Frozen
    if(f.frozen>0){
      f.frozen=Math.max(0,f.frozen-dt);
      if(f.frozen===0){ removeStatus(f,'❄'); f.el.querySelector('.fighter-body').style.filter=''; }
      updateVisuals(f); return;
    }
    // Status ticks
    if(f.statuses.poison){
      f.statuses.poison.timer-=dt;
      f.statuses.poison.tick-=dt;
      if(f.statuses.poison.tick<=0){ f.statuses.poison.tick=1.0; damage(f,5,f.statuses.poison.attacker,'#55cc55'); }
      if(f.statuses.poison.timer<=0){ delete f.statuses.poison; removeStatus(f,'☠'); }
    }
    if(f.overdriven>0){ f.overdriven=Math.max(0,f.overdriven-dt); if(f.overdriven===0) removeStatus(f,'⚡'); }
    if(f.hexed>0)     { f.hexed=Math.max(0,f.hexed-dt);           if(f.hexed===0) removeStatus(f,'💜'); }
    if(f.stealthed>0) {
      f.stealthed=Math.max(0,f.stealthed-dt);
      if(f.stealthed===0){ f.el.style.opacity='1'; f.stealthBonus=true; removeStatus(f,'👻'); }
    }
    // Wander
    f.wanderT-=dt;
    if(f.wanderT<=0){
      f.wanderT=2.5+Math.random()*2.5;
      const a=Math.random()*Math.PI*2;
      const sp=f.speed*(f.overdriven?1.6:1);
      f.vx=Math.cos(a)*sp; f.vy=Math.sin(a)*sp;
    }
    const sp=f.overdriven?1.5:1;
    f.x+=f.vx*dt*sp; f.y+=f.vy*dt*sp;
    // Clamp to octagon
    if(!pointInOctagon(f.x,f.y,CX,CY,R-18)){
      const clamped=clampToOctagon(f.x,f.y,CX,CY,R);
      f.x=clamped.x; f.y=clamped.y;
      f.vx*=-0.6; f.vy*=-0.6;
    }
    f.el.style.left=f.x+'px'; f.el.style.top=f.y+'px';
    // Update sprite facing
    if(Math.abs(f.vx)>1){
      const newFacing=f.vx<0?-1:1;
      if(newFacing!==f.facing){
        f.facing=newFacing;
        const sc=f.el.querySelector('.fighter-body canvas');
        if(sc){
          const ns=renderSprite(f.arch,f.spriteColors,f.facing);
          sc.width=ns.width; sc.height=ns.height;
          sc.getContext('2d').drawImage(ns,0,0);
        }
      }
    }
    // Flame trail
    if(f.trailActive>0){
      f.trailActive-=dt;
      if(f.trailActive<=0) removeStatus(f,'🔥');
      if(Math.random()<0.25) spawnFlameNode(f);
    }
    // Cooldowns
    const cdMult=f.overdriven?0.55:1;
    f.regCD=Math.max(0,f.regCD-dt);
    f.spcCD=Math.max(0,f.spcCD-dt);
    // Target
    const enemies=fighters.filter(e=>e.alive&&e!==f&&!friendly(f,e));
    if(!enemies.length) return;
    enemies.sort((a,b)=>dst(f,a)-dst(f,b));
    const tgt=f.mindCtrl? enemies.find(e=>e!==f.mindCtrl)||enemies[0] : enemies[0];
    if(!tgt) return;
    const d=dst(f,tgt);
    // Regular
    const rm=REG[f.data.reg];
    if(f.regCD<=0&&rm&&d<(rm.range||60)+35){
      f.regCD=f.regCDmax*cdMult;
      doRegular(f,tgt,rm);
    }
    // Special
    const sm=SPC[f.data.spc];
    if(f.spcCD<=0&&sm&&d<(sm.range||120)+35){
      f.spcCD=f.spcCDmax;
      doSpecial(f,tgt,sm,enemies);
    }
    updateVisuals(f);
  });
}
// ============================================================
// REGULAR MOVES
// ============================================================
function doRegular(f,tgt,rm) {
  bubble(f,rm.name,false);
  flashBody(f);
  switch(rm.type){
    case 'melee': {
      mkAnim(rm.animKey,tgt.x,tgt.y);
      let d=rng(rm.dmg[0],rm.dmg[1]);
      if(f.stealthBonus){d*=2;f.stealthBonus=false;}
      if(tgt.hexed) d*=2;
      if(tgt.spikeArmor) damage(f,Math.floor(d*0.3),null,'#c87020');
      damage(tgt,d,f,f.data.color);
      if(rm.poison) applyPoison(tgt,f);
      if(rm.snare) applyFreeze(tgt,1.8);
      break;
    }
    case 'aoe_m': {
      mkAnim('claw',f.x,f.y);
      fighters.filter(e=>e.alive&&e!==f&&!friendly(f,e)&&dst(f,e)<70).forEach(e=>{
        let d=rng(rm.dmg[0],rm.dmg[1]);
        if(e.hexed) d*=2;
        if(e.spikeArmor) damage(f,Math.floor(d*0.3),null,'#c87020');
        damage(e,d,f,f.data.color);
      });
      break;
    }
    case 'proj': spawnProj(f,tgt,rm,false); break;
    case 'bomb': spawnBomb(f,tgt,rm); break;
    case 'dashm': {
      mkAnim(rm.animKey,tgt.x,tgt.y);
      const ang=Math.atan2(tgt.y-f.y,tgt.x-f.x);
      f.x+=Math.cos(ang)*65; f.y+=Math.sin(ang)*65;
      let d=rng(rm.dmg[0],rm.dmg[1]);
      if(tgt.hexed) d*=2;
      damage(tgt,d,f,f.data.color);
      break;
    }
    case 'aoe': {
      mkAnim(rm.animKey,f.x,f.y);
      fighters.filter(e=>e.alive&&e!==f&&!friendly(f,e)&&dst(f,e)<(rm.range||75)).forEach(e=>{
        let d=rng(rm.dmg[0],rm.dmg[1]);
        if(e.hexed) d*=2;
        damage(e,d,f,f.data.color);
      });
      break;
    }
    case 'scatter': {
      const ang=Math.atan2(tgt.y-f.y,tgt.x-f.x);
      for(let i=0;i<5;i++){
        const a=ang+(Math.random()-0.5)*0.9;
        spawnAngProj(f,a,195,rm.dmg[0],rm.dmg[1],f.data.color,false,{snare:false});
      }
      break;
    }
    case 'turret': spawnTurret(f); break;
    default: {
      let d=rng(rm.dmg[0],rm.dmg[1]);
      if(tgt.hexed) d*=2;
      damage(tgt,d,f,f.data.color);
      mkAnim('burst',tgt.x,tgt.y);
    }
  }
}

function doSpecial(f,tgt,sm,all) {
  bubble(f,sm.name,true);
  flashBody(f);
  switch(sm.type){
    case 'teleport': {
      mkAnim('teleport',f.x,f.y);
      f.x=tgt.x+(Math.random()-0.5)*18; f.y=tgt.y+(Math.random()-0.5)*18;
      setTimeout(()=>mkAnim('teleport',f.x,f.y),100);
      let d=rng(sm.dmg[0],sm.dmg[1]);
      if(f.stealthBonus){d*=2;f.stealthBonus=false;}
      if(tgt.hexed) d*=2;
      damage(tgt,d,f,'#8833cc');
      break;
    }
    case 'laser': {
      const ang=Math.atan2(tgt.y-f.y,tgt.x-f.x);
      mkLaser(f,ang);
      break;
    }
    case 'bhole': {
      mkBlackHole(f,tgt.x,tgt.y,sm);
      break;
    }
    case 'aoe': {
      mkAnim(sm.animKey,f.x,f.y);
      fighters.filter(e=>e.alive&&e!==f&&!friendly(f,e)&&dst(f,e)<(sm.range||120)).forEach(e=>{
        let d=rng(sm.dmg[0],sm.dmg[1]);
        if(e.hexed) d*=2;
        damage(e,d,f,'#c87020');
      });
      break;
    }
    case 'proj': spawnProj(f,tgt,sm,true); break;
    case 'clone': {
      mkAnim('clone',f.x,f.y);
      mkClone(f);
      break;
    }
    case 'shield': {
      mkAnim('reflect',f.x,f.y);
      f.shielded=true;
      f.el.querySelector('.fighter-body').style.boxShadow='0 0 18px #ccccff,0 0 35px #8888cc';
      addStatus(f,'🛡');
      bTO(()=>{
        if(f.alive){f.shielded=false;f.el.querySelector('.fighter-body').style.boxShadow=`0 2px 8px rgba(0,0,0,0.8)`;removeStatus(f,'🛡');}
      },3500);
      break;
    }
    case 'leech': {
      const ang=Math.atan2(tgt.y-f.y,tgt.x-f.x);
      mkLeechBeam(f.x,f.y,ang,dst(f,tgt));
      let d=rng(sm.dmg[0],sm.dmg[1]);
      if(tgt.hexed) d*=2;
      damage(tgt,d,f,'#99cc00');
      f.hp=Math.min(f.maxHp,f.hp+d*0.65);
      break;
    }
    case 'leech_m': {
      mkAnim('vbite',tgt.x,tgt.y);
      let d=rng(sm.dmg[0],sm.dmg[1]);
      if(f.stealthBonus){d*=2;f.stealthBonus=false;}
      if(tgt.hexed) d*=2;
      if(tgt.spikeArmor) damage(f,Math.floor(d*0.3),null,'#c87020');
      damage(tgt,d,f,'#cc0044');
      f.hp=Math.min(f.maxHp,f.hp+d*0.55);
      break;
    }
    case 'chain': mkChain(f,tgt,sm); break;
    case 'cloud': mkCloud(f,tgt.x,tgt.y,sm,'spore'); break;
    case 'buff_od': {
      f.overdriven=5;
      addStatus(f,'⚡');
      mkAnim('overdrive',f.x,f.y);
      break;
    }
    case 'buff_sp': {
      f.spikeArmor=true;
      addStatus(f,'🦔');
      mkAnim('spikearmor',f.x,f.y);
      bTO(()=>{ if(f.alive){removeStatus(f,'🦔'); f.spikeArmor=f.data.spc==='spike_armor';} },6000);
      break;
    }
    case 'vortex': {
      const el=document.createElement('div');
      el.className='anim-vortex';
      el.style.cssText=`left:${tgt.x}px;top:${tgt.y}px;transform:translate(-50%,-50%)`;
      document.getElementById('arena').appendChild(el);
      vortices.push({el,x:tgt.x,y:tgt.y,owner:f,timer:3,dmgTick:0});
      break;
    }
    case 'meteor': mkMeteor(f,tgt.x,tgt.y,sm); break;
    case 'mindctrl': {
      mkAnim('mindctrl',tgt.x,tgt.y);
      tgt.mindCtrl=f;
      tgt.el.querySelector('.fighter-body').style.borderColor='#cc44cc';
      addStatus(tgt,'💜');
      bTO(()=>{
        if(tgt.alive){tgt.mindCtrl=null;tgt.el.querySelector('.fighter-body').style.borderColor=tgt.data.color;removeStatus(tgt,'💜');}
      },3500);
      break;
    }
    case 'timewarp': {
      mkAnim('timewarp',f.x,f.y);
      addStatus(f,'⏱');
      fighters.filter(e=>e.alive&&e!==f).forEach(e=>{ e.frozen=Math.max(e.frozen,2.8); addStatus(e,'❄'); });
      bTO(()=>removeStatus(f,'⏱'),3000);
      break;
    }
    case 'nullify': {
      mkAnim('nullify',tgt.x,tgt.y);
      tgt.regCD=tgt.regCDmax*3;
      tgt.spcCD=tgt.spcCDmax*2.5;
      addStatus(tgt,'🚫');
      bTO(()=>removeStatus(tgt,'🚫'),3000);
      break;
    }
    case 'sacrifice': {
      mkAnim('sacrifice',f.x,f.y);
      fighters.filter(e=>e.alive&&e!==f&&!friendly(f,e)&&dst(f,e)<(sm.range||160)).forEach(e=>{
        let d=rng(sm.dmg[0],sm.dmg[1]);
        if(e.hexed) d*=2;
        damage(e,d,f,'#ff0000');
      });
      damage(f,f.hp*0.4,null,'#ff4444');
      break;
    }
    case 'trail': {
      f.trailActive=5;
      addStatus(f,'🔥');
      break;
    }
    case 'quake': {
      mkAnim('quake',f.x,f.y);
      fighters.filter(e=>e.alive&&e!==f&&!friendly(f,e)&&dst(f,e)<(sm.range||170)).forEach(e=>{
        let d=rng(sm.dmg[0],sm.dmg[1]);
        if(e.hexed) d*=2;
        damage(e,d,f,'#8B4513');
        applyFreeze(e,1.2);
      });
      break;
    }
    case 'mortar': mkMortar(f,tgt,sm); break;
    case 'stealth': {
      mkAnim('stealth',f.x,f.y);
      f.el.style.opacity='0.18';
      f.stealthed=3.5;
      f.stealthBonus=false;
      addStatus(f,'👻');
      break;
    }
    case 'shockwave': {
      mkAnim('shockwave',f.x,f.y);
      fighters.filter(e=>e.alive&&e!==f&&!friendly(f,e)&&dst(f,e)<(sm.range||140)).forEach(e=>{
        let d=rng(sm.dmg[0],sm.dmg[1]);
        if(e.hexed) d*=2;
        damage(e,d,f,'#c8a030');
        // knock back
        const ang=Math.atan2(e.y-f.y,e.x-f.x);
        e.x+=Math.cos(ang)*40; e.y+=Math.sin(ang)*40;
      });
      break;
    }
    case 'warpdash': {
      const ang=Math.atan2(tgt.y-f.y,tgt.x-f.x);
      for(let s=0;s<4;s++){
        const wx=f.x+Math.cos(ang)*s*28, wy=f.y+Math.sin(ang)*s*28;
        setTimeout(()=>{
          const el=document.createElement('div');
          el.className='anim-warp';
          el.style.cssText=`left:${wx}px;top:${wy}px;width:30px;height:30px;background:${f.data.color}66;transform:translate(-50%,-50%)`;
          document.getElementById('arena').appendChild(el);
          setTimeout(()=>el.remove(),400);
        },s*60);
      }
      f.x=tgt.x+(Math.random()-0.5)*25; f.y=tgt.y+(Math.random()-0.5)*25;
      fighters.filter(e=>e.alive&&e!==f&&!friendly(f,e)&&dst(f,e)<55).forEach(e=>{
        let d=rng(sm.dmg[0],sm.dmg[1]);
        if(e.hexed) d*=2;
        damage(e,d,f,f.data.color);
      });
      break;
    }
    case 'acidpool': {
      mkCloud(f,tgt.x,tgt.y,sm,'acid');
      break;
    }
    case 'gravwell': {
      const el=document.createElement('div');
      el.className='anim-gravwell';
      el.style.cssText=`left:${tgt.x}px;top:${tgt.y}px;width:80px;height:80px;transform:translate(-50%,-50%)`;
      document.getElementById('arena').appendChild(el);
      vortices.push({el,x:tgt.x,y:tgt.y,owner:f,timer:4,dmgTick:0,slowOnly:true});
      break;
    }
    case 'souldrain': {
      mkAnim('souldrain',tgt.x,tgt.y);
      const ang2=Math.atan2(f.y-tgt.y,f.x-tgt.x);
      mkLeechBeam(tgt.x,tgt.y,ang2,dst(f,tgt));
      let d=rng(sm.dmg[0],sm.dmg[1]);
      if(tgt.hexed) d*=2;
      damage(tgt,d,f,'#cc0066');
      tgt.maxHp=Math.max(40,tgt.maxHp-12);
      if(tgt.hp>tgt.maxHp) tgt.hp=tgt.maxHp;
      break;
    }
    case 'decoy': {
      mkDecoy(f);
      break;
    }
    case 'nova': {
      mkAnim('nova',f.x,f.y);
      fighters.filter(e=>e.alive&&e!==f&&!friendly(f,e)&&dst(f,e)<(sm.range||160)).forEach(e=>{
        let d=rng(sm.dmg[0],sm.dmg[1]);
        if(e.hexed) d*=2;
        damage(e,d,f,'#ffaa30');
      });
      break;
    }
    case 'hex': {
      mkAnim('hex',tgt.x,tgt.y);
      tgt.hexed=5;
      addStatus(tgt,'💜');
      break;
    }
    case 'phase': {
      mkAnim('phase',f.x,f.y);
      f.el.style.opacity='0.25';
      f.stealthed=2.5;
      addStatus(f,'👻');
      break;
    }
    case 'thornwall': {
      const ang=Math.atan2(tgt.y-f.y,tgt.x-f.x);
      for(let i=-2;i<=2;i++){
        const wx=tgt.x+Math.cos(ang+Math.PI/2)*i*22;
        const wy=tgt.y+Math.sin(ang+Math.PI/2)*i*22;
        const el=document.createElement('div');
        el.className='anim-thornwall';
        el.style.cssText=`left:${wx}px;top:${wy}px`;
        el.textContent='🌵';
        document.getElementById('arena').appendChild(el);
        setTimeout(()=>el.remove(),2800);
        clouds.push({x:wx,y:wy,owner:f,timer:2.8,dmgTick:0.5,tickAmt:[sm.dmg[0],sm.dmg[1]],radius:22,type:'thorn'});
      }
      break;
    }
    case 'fungal': {
      mkAnim('fungal',f.x,f.y);
      fighters.filter(e=>e.alive&&e!==f&&!friendly(f,e)&&dst(f,e)<(sm.range||130)).forEach(e=>{
        let d=rng(sm.dmg[0],sm.dmg[1]);
        if(e.hexed) d*=2;
        damage(e,d,f,'#66aa22');
        applyPoison(e,f);
      });
      break;
    }
    case 'cone': {
      const el=document.createElement('div');
      el.className='anim-plasma';
      const ang=Math.atan2(tgt.y-f.y,tgt.x-f.x)*180/Math.PI;
      el.style.cssText=`left:${f.x}px;top:${f.y}px;transform:translate(0,-50%) rotate(${ang}deg)`;
      document.getElementById('arena').appendChild(el);
      setTimeout(()=>el.remove(),400);
      fighters.filter(e=>e.alive&&e!==f&&!friendly(f,e)).forEach(e=>{
        const ex=e.x-f.x, ey=e.y-f.y;
        const a=Math.atan2(ey,ex)-Math.atan2(tgt.y-f.y,tgt.x-f.x);
        const na=((a%(Math.PI*2))+Math.PI*2)%(Math.PI*2);
        if((na<0.5||na>Math.PI*2-0.5)&&dst(f,e)<(sm.range||130)){
          let d=rng(sm.dmg[0],sm.dmg[1]);
          if(e.hexed) d*=2;
          damage(e,d,f,'#ff6600');
        }
      });
      break;
    }
    case 'cryo': {
      mkCloud(f,tgt.x,tgt.y,sm,'cryo');
      break;
    }
    case 'orbital': mkOrbital(f,tgt.x,tgt.y,sm); break;
    case 'singularity': mkSingularity(f,tgt.x,tgt.y,sm); break;
    default: {
      mkAnim('burst',f.x,f.y);
      fighters.filter(e=>e.alive&&e!==f&&!friendly(f,e)&&dst(f,e)<120).forEach(e=>{
        let d=rng(sm.dmg?.[0]||20,sm.dmg?.[1]||35);
        if(e.hexed) d*=2;
        damage(e,d,f,f.data.color);
      });
    }
  }
}

function tickProjectiles(dt) {
  for(let i=projectiles.length-1;i>=0;i--){
    const p=projectiles[i];
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.life-=dt;
    p.el.style.left=p.x+'px'; p.el.style.top=p.y+'px';
    if(p.life<=0||p.x<-60||p.x>AW+60||p.y<-60||p.y>AH+60){
      p.el.remove(); projectiles.splice(i,1); continue;
    }
    let hit=false;
    for(const f of fighters){
      if(!f.alive||f===p.owner||friendly(p.owner,f)) continue;
      if(dst({x:p.x,y:p.y},f)<(p.sz||9)+14){
        if(f.shielded){ p.vx*=-1; p.vy*=-1; p.owner=f; const ra=Math.atan2(p.vy,p.vx); p.el.style.transform=`translate(-50%,-50%) rotate(${ra}rad)`; break; }
        let d=rng(p.move.dmg?.[0]||10,p.move.dmg?.[1]||20);
        // mind_spike scales with number of living enemies
        if(p.move===SPC.mind_spike){ const alive=fighters.filter(x=>x.alive&&!x.cloneOf).length; d=Math.floor(10+alive*12); }
        if(f.hexed) d*=2;
        if(p.owner.stealthBonus){d*=2;p.owner.stealthBonus=false;}
        if(f.spikeArmor) damage(p.owner,Math.floor(d*0.3),null,'#c87020');
        damage(f,d,p.owner,p.col||p.owner.data.color);
        if(p.move.poison) applyPoison(f,p.owner);
        if(p.move.freeze||p.move.snare) applyFreeze(f,p.move.freeze?2.2:1.6);
        if(p.move.type==='leech'||p.move.type==='leech_m') p.owner.hp=Math.min(p.owner.maxHp,p.owner.hp+d*0.5);
        // freeze burst anim
        if(p.move.freeze){ const fb=document.createElement('div'); fb.className='anim-freeze-burst'; fb.style.cssText=`left:${f.x}px;top:${f.y}px;background:radial-gradient(circle,#aaddff,#0055aa,transparent)`; document.getElementById('arena').appendChild(fb); setTimeout(()=>fb.remove(),500); }
        p.el.remove(); projectiles.splice(i,1); hit=true; break;
      }
    }
  }
}

// ============================================================
// TICK SYSTEMS
// ============================================================
function tickVortices(dt) {
  for(let i=vortices.length-1;i>=0;i--){
    const v=vortices[i];
    v.timer-=dt; v.dmgTick+=dt;
    if(v.timer<=0){ v.el.remove(); vortices.splice(i,1); continue; }
    if(v.dmgTick>=0.2){
      v.dmgTick=0;
      fighters.filter(f=>f.alive&&f!==v.owner&&!friendly(v.owner,f)).forEach(f=>{
        const d=dst({x:v.x,y:v.y},f);
        const range=v.sm?.range||130;
        if(d<range){
          if(!v.slowOnly){
            f.x+=(v.x-f.x)*(v.pullStrong?0.1:0.06);
            f.y+=(v.y-f.y)*(v.pullStrong?0.1:0.06);
            if(d<55){
              let dmg=rng(v.sm?.dmg[0]||14,v.sm?.dmg[1]||22)*0.25;
              if(f.hexed) dmg*=2;
              damage(f,Math.floor(dmg),v.owner,'#8833aa');
            }
          } else {
            f.vx*=0.85; f.vy*=0.85;
          }
        }
      });
    }
  }
}
function tickClouds(dt) {
  for(let i=clouds.length-1;i>=0;i--){
    const c=clouds[i];
    c.timer-=dt; c.dmgTick+=dt;
    if(c.timer<=0){ clouds.splice(i,1); continue; }
    if(c.dmgTick>=0.35){
      c.dmgTick=0;
      fighters.filter(f=>f.alive&&f!==c.owner&&!friendly(c.owner,f)&&dst({x:c.x,y:c.y},f)<(c.radius||45)).forEach(f=>{
        let dmg=rng(c.tickAmt[0],c.tickAmt[1])*0.3;
        if(f.hexed) dmg*=2;
        damage(f,Math.floor(dmg),c.owner,'#66aa22');
        if(c.type==='spore') applyPoison(f,c.owner);
        if(c.type==='cryo') applyFreeze(f,0.5);
      });
    }
  }
}
function tickFlames(dt) {
  for(let i=flameNodes.length-1;i>=0;i--){
    const fn=flameNodes[i];
    fn.timer-=dt;
    if(fn.timer<=0){ fn.el.remove(); flameNodes.splice(i,1); continue; }
    fighters.filter(f=>f.alive&&f!==fn.owner&&dst({x:fn.x,y:fn.y},f)<18).forEach(f=>{
      if(Math.random()<0.15){
        let d=rng(7,13);
        if(f.hexed) d*=2;
        damage(f,d,fn.owner,'#ff7700');
      }
    });
  }
}
function tickSingularities(dt) {
  for(let i=singOrbs.length-1;i>=0;i--){
    const s=singOrbs[i];
    s.timer-=dt; s.dmgTick+=dt;
    s.cx+=s.vx*dt; s.cy+=s.vy*dt;
    if(s.cx<30||s.cx>AW-30) s.vx*=-1;
    if(s.cy<30||s.cy>AH-30) s.vy*=-1;
    s.el.style.left=s.cx+'px'; s.el.style.top=s.cy+'px';
    if(s.timer<=0){ s.el.remove(); singOrbs.splice(i,1); continue; }
    if(s.dmgTick>=0.15){
      s.dmgTick=0;
      fighters.filter(f=>f.alive&&f!==s.owner&&!friendly(s.owner,f)).forEach(f=>{
        const d=dst({x:s.cx,y:s.cy},f);
        if(d<160){ f.x+=(s.cx-f.x)*0.055; f.y+=(s.cy-f.y)*0.055; }
        if(d<40){
          let dmg=rng(s.sm.dmg[0],s.sm.dmg[1])*0.12;
          if(f.hexed) dmg*=2;
          damage(f,Math.floor(dmg),s.owner,'#6600ff');
        }
      });

  }

function tickTurrets(dt) {
  for(let i=turretObjs.length-1;i>=0;i--){
    const t=turretObjs[i];
    t.timer-=dt; t.shootCD-=dt;
    if(t.timer<=0){ t.el.remove(); turretObjs.splice(i,1); continue; }
    if(t.shootCD<=0){
      t.shootCD=1.2;
      const enemies=fighters.filter(f=>f.alive&&f!==t.owner&&!friendly(t.owner,f)&&dst({x:t.x,y:t.y},f)<200);
      if(enemies.length>0){
        enemies.sort((a,b)=>dst({x:t.x,y:t.y},a)-dst({x:t.x,y:t.y},b));
        const e=enemies[0];
        let d=rng(13,19);
        if(e.hexed) d*=2;
        damage(e,d,t.owner,'#99aa88');
        mkChainLine(t.x,t.y,e.x,e.y);
      }
    }
  }
}

function damage(f,amount,atk,col) {
  if(!f||!f.alive) return;
  amount=Math.floor(amount);
  if(amount<=0) return;
  f.hp-=amount;
  updateVisuals(f);
  mkDmgNum(f.x,f.y,amount,col||'#ffffff');
  if(f.hp<=0) kill(f,atk);
}
function kill(f,atk) {
  f.alive=false;
  f.el.style.display='none';
  if(!f.cloneOf) {
    elimination.unshift(f);
    const row=document.getElementById(sbId(f.data.name));
    if(row) row.classList.add('dead');
  }
  const burst=document.createElement('div');
  burst.className='death-burst';
  burst.style.cssText=`left:${f.x}px;top:${f.y}px;width:50px;height:50px;background:radial-gradient(circle,${f.data.color},#cc4400,transparent)`;
  document.getElementById('arena').appendChild(burst);
  setTimeout(()=>burst.remove(),700);
}
function applyPoison(f, attacker=null) {
  if(f.statuses.poison){ f.statuses.poison.timer=4.5; return; }
  f.statuses.poison={timer:4.5,tick:1.0,attacker};
  addStatus(f,'☠');

function applyFreeze(f,dur) {

function addStatus(f,icon) {

}
function removeStatus(f,icon) {

  el.style.cssText=`left:${x}px;top:${y-18}px;color:${col};font-size:${sz}`;
  el.textContent=n;
  document.getElementById('arena').appendChild(el);
  setTimeout(()=>el.remove(),1000);
}
function updateVisuals(f) {
  if(!f.el) return;
  const pct=Math.max(0,f.hp/f.maxHp);
  const col=pct>0.5?'#66cc44':pct>0.25?'#cc9922':'#cc3322';
  if(!f.cloneOf) {
    const row=document.getElementById(sbId(f.data.name));
    if(row){ const b=row.querySelector('.sb-hp-bar'); if(b){b.style.width=(pct*100)+'%';b.style.background=col;} }
  }
}
// ============================================================
// HELPERS
// ============================================================
function dst(a,b) { return Math.hypot(a.x-b.x,a.y-b.y); }
function rng(a,b) { return Math.floor(Math.random()*(b-a+1))+a; }
function friendly(a,b) { return a.cloneOf===b||b.cloneOf===a||(a.cloneOf&&a.cloneOf===b.cloneOf); }
function updateHUD() {
  const n=fighters.filter(f=>f.alive&&!f.cloneOf).length;
  const pill=document.getElementById('alive-pill');
  if(pill) pill.textContent=`⚙ ${n} Alive`;
}
// ============================================================
// RESULTS
// ============================================================
function showResults(aliveArr) {
  battleActive=false; clearBattleTimers();
  if(rafId) cancelAnimationFrame(rafId);
  if(!aliveArr || aliveArr.length===0) {
    // All fighters died simultaneously — pull top 3 from elimination order
    aliveArr=[];
  }
  const top=[];
  if(aliveArr[0]) top.push(aliveArr[0]);
  for(let i=0;i<Math.min(3-top.length,elimination.length);i++) top.push(elimination[i]);
  const podium=document.getElementById('podium');
  podium.innerHTML='';
  if(top.length===0){ podium.innerHTML='<div style="color:var(--dim);font-family:Russo One,sans-serif;letter-spacing:0.1em">NO SURVIVORS</div>'; showScreen('results-screen'); return; }
  const order=[top[1],top[0],top[2]];
  const defs=[
    {cls:'place-2',lbl:'2nd',h:65},
    {cls:'place-1',lbl:'1st',h:90},
    {cls:'place-3',lbl:'3rd',h:45},
  ];
  order.forEach((f,idx)=>{
    if(!f) return;
    const d=defs[idx];
    const div=document.createElement('div');
    div.className=`podium-place ${d.cls}`;
    div.innerHTML=`
      <div class="podium-icon" style="background:${f.data.color}22">${f.data.emoji}</div>
      <div class="podium-name">${f.data.name}</div>
      <div class="podium-block" style="height:${d.h}px">${d.lbl==='1st'?'1':d.lbl==='2nd'?'2':'3'}</div>
    `;
    podium.appendChild(div);
  });
  showScreen('results-screen');
}
function endBattle() { battleActive=false; clearBattleTimers(); if(rafId) cancelAnimationFrame(rafId); showScreen('menu'); }
// ============================================================
// INIT
// ============================================================
buildDebris();
buildCountSel();
window.addEventListener('resize',()=>{
  if(document.getElementById('battle-screen').classList.contains('active')){
    const mobile=isMobile();
    if(mobile){
      AW=window.innerWidth; AH=window.innerHeight-90;
    } else {
      AW=window.innerWidth-SIDEBAR_W; AH=window.innerHeight;
    }
    document.getElementById('arena-wrap').style.width=AW+'px';
    document.getElementById('arena-wrap').style.height=AH+'px';
    drawOctaBorder();
  }
});
</script>
